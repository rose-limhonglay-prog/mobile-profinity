<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROfinity — Web</title>
  <link rel="stylesheet" href="dark-mode.css" />
  <script src="dark-mode-init.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.dark-mode {
      background: #111;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 40px 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo img {
      height: 32px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.3px;
    }

    body.dark-mode .logo-text {
      color: #fff;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #fff;
      border-radius: 12px;
      text-decoration: none;
      color: #000;
      font-size: 15px;
      font-weight: 500;
      border: 1px solid #e8e8e8;
      transition: background 0.15s, border-color 0.15s;
    }

    .nav-list a:hover {
      background: #f0f0f0;
      border-color: #d0d0d0;
    }

    body.dark-mode .nav-list a {
      background: #1c1c1e;
      color: #fff;
      border-color: #2c2c2e;
    }

    body.dark-mode .nav-list a:hover {
      background: #2c2c2e;
    }

    .arrow {
      color: #aaa;
      font-size: 13px;
    }

    .divider {
      height: 1px;
      background: #e8e8e8;
      margin: 24px 0;
    }

    body.dark-mode .divider {
      background: #2c2c2e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="assets/profinity-logo.png" alt="PROfinity" onerror="this.style.display='none'" />
      <span class="logo-text">PROfinity</span>
    </div>

    <h1>Web Pages</h1>
    <ul class="nav-list">
      <li><a href="NewsfeedWeb.html">Newsfeed <span class="arrow">›</span></a></li>
      <li><a href="ClinicianDirectory.html">Clinician Directory <span class="arrow">›</span></a></li>
      <li><a href="Agent.html">Agent <span class="arrow">›</span></a></li>
      <li><a href="MyLearning.html">My Learning <span class="arrow">›</span></a></li>
      <li><a href="MySaved.html">My Saved <span class="arrow">›</span></a></li>
      <li><a href="AccountSettings.html">Account Settings <span class="arrow">›</span></a></li>
      <li><a href="DisplaySettings.html">Display Settings <span class="arrow">›</span></a></li>
    </ul>

    <div class="divider"></div>

    <h1>Mobile Preview</h1>
    <ul class="nav-list">
      <li><a href="NewsfeedMobile.html">Newsfeed <span class="arrow">›</span></a></li>
      <li><a href="CommunityMobile.html">Community <span class="arrow">›</span></a></li>
      <li><a href="LearningMobile.html">Learning <span class="arrow">›</span></a></li>
      <li><a href="EventsMobile.html">Events <span class="arrow">›</span></a></li>
      <li><a href="SearchMobile.html">Search <span class="arrow">›</span></a></li>
      <li><a href="ProfileMobile.html">Profile <span class="arrow">›</span></a></li>
      <li><a href="CreatePostMobile.html">Create Post <span class="arrow">›</span></a></li>
    </ul>
  </div>
</body>
</html>
